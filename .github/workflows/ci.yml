name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Type-check, Test (cross-browser)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        # tsc --build per tsconfig.json
        run: bun run build

      - name: Type-check
        # Script "lint" in package.json maps to tsc --noEmit
        run: bun run lint

      - name: Install Playwright browsers
        # web-test-runner uses @web/test-runner-playwright which needs browser
        # binaries present on the runner. Install all three so cross-browser
        # coverage matches local development.
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Test
        # Runs wtr (web-test-runner) in headless mode via Playwright launcher
        run: bun run test
